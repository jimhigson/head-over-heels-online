name: Check- tests, lint, formatting

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 25.x
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm run check
