name: E2E

on:
  pull_request:
    branches: [main]

jobs:
  # mirror the visual-regression workflow's pattern: always run, but exit
  # quickly when the paths governed by this workflow have not changed.
  check-changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      should-run: ${{ steps.filter.outputs.e2e-trigger-files }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: "shell"
          filters: |
            e2e-trigger-files:
              - 'src/**'
              - 'e2e/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/e2e.yml'

  build-game:
    needs: check-changes
    if: needs.check-changes.outputs.should-run == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Cache game build
        uses: actions/cache@v5
        id: game-build-cache
        with:
          path: dist/
          # share with the visual-regression workflow's build cache - same
          # contents, same key shape (sha-pinned).
          key: game-build-visual-regression-${{ github.sha }}
          enableCrossOsArchive: true

      - name: Install pnpm
        if: steps.game-build-cache.outputs.cache-hit != 'true'
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        if: steps.game-build-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
          cache: "pnpm"

      - run: pnpm install
        if: steps.game-build-cache.outputs.cache-hit != 'true'

      - name: Build game
        if: steps.game-build-cache.outputs.cache-hit != 'true'
        run: pnpm build:game --mode visual-regression

  e2e-tests:
    needs: [check-changes, build-game]
    if: needs.check-changes.outputs.should-run == 'true'
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        suite:
          - lifeAndDeath
          - persistOnReload
          - crownsDialogs
          - offlineCampaignCache
    name: E2E ${{ matrix.suite }}
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25.x
          cache: "pnpm"

      - run: pnpm install

      - name: Restore game build cache
        uses: actions/cache/restore@v5
        with:
          path: dist/
          key: game-build-visual-regression-${{ github.sha }}
          enableCrossOsArchive: true

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: pnpm playwright install chromium

      - name: Run Playwright tests
        run: pnpm playwright test ${{ matrix.suite }} --project chromium-desktop

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-e2e-${{ matrix.suite }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-gate:
    name: "E2E Gate"
    runs-on: ubuntu-24.04-arm
    needs: [check-changes, e2e-tests]
    if: always()
    steps:
      - run: |
          if [[ "${{ needs.check-changes.outputs.should-run }}" != "true" ]]; then
            echo "E2E skipped - not required"
            exit 0
          elif [[ "${{ needs.e2e-tests.result }}" == "success" ]]; then
            echo "E2E tests passed"
            exit 0
          else
            echo "E2E tests failed"
            exit 1
          fi
