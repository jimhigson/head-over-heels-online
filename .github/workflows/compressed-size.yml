name: Compressed Size

on:
  pull_request:
    branches: ["main"]

jobs:
  compressed-size:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 25.x
          cache: "pnpm"
      - name: Game bundle size
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: "build:game"
          clean-script: "clean"
          pattern: "./dist/assets/*.{js,css,mp3,png}"
          # strip content hashes from filenames (e.g. App-DK0reEgR.js → App.js)
          # so the action can match chunks across the base and PR branches
          strip-hash: "(-[a-zA-Z0-9_-]{8})\\."
          compression: "gzip"
          minimum-change-threshold: 50
          comment-key: "game"
          sort-by: "Size:desc"
      # The first action leaves HEAD on main, so re-checkout the PR merge
      # commit before running the second action
      - uses: actions/checkout@v6
      - name: Editor bundle size
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: "build:editor"
          clean-script: "clean"
          pattern: "./dist/editor/assets/*.{js,css,mp3,png}"
          strip-hash: "(-[a-zA-Z0-9_-]{8})\\."
          compression: "gzip"
          minimum-change-threshold: 50
          comment-key: "editor"
          sort-by: "Size:desc"
